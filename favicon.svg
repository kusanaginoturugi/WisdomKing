<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景 -->
  <rect width="32" height="32" rx="7" fill="#0a0e1a"/>

  <!-- 外縁ヒント -->
  <rect x="2" y="2" width="28" height="28" rx="6" stroke="#c8a44a" stroke-width="0.5" fill="none" opacity="0.25"/>

  <!-- 上部装飾点（bindu） -->
  <circle cx="16" cy="5.5" r="1.4" fill="#c8a44a"/>

  <!-- 頭線（virama 風横棒） -->
  <path d="M 7 9.5 Q 16 8.5 25 9.5" stroke="#c8a44a" stroke-width="1.6" stroke-linecap="round" fill="none"/>

  <!-- 左画：上中央 → 左下へ弧を描き、末尾を内側にはね上げる -->
  <path d="M 15.5 11.5
           C 13.5 14.5  10 19  7.5 24.5
           Q 6.5 26.5  8.5 25.8"
        stroke="#c8a44a" stroke-width="2.3" stroke-linecap="round" fill="none"/>

  <!-- 右画：上中央 → 右下へ弧を描き、末尾を内側にはね上げる -->
  <path d="M 16.5 11.5
           C 18.5 14.5  22 19  24.5 24.5
           Q 25.5 26.5  23.5 25.8"
        stroke="#c8a44a" stroke-width="2.3" stroke-linecap="round" fill="none"/>
</svg>
